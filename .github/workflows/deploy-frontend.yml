name: Deploy Frontend

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || { echo "Missing required secret: SSH_HOST" >&2; exit 1; }
          test -n "${{ secrets.SSH_USER }}" || { echo "Missing required secret: SSH_USER" >&2; exit 1; }
          test -n "${{ secrets.SSH_PASSWORD }}" || { echo "Missing required secret: SSH_PASSWORD" >&2; exit 1; }
          test -n "${{ secrets.FRONTEND_ENV_FILE }}" || { echo "Missing required secret: FRONTEND_ENV_FILE" >&2; exit 1; }

      - name: Resolve Frontend Source Directory
        run: |
          if [ -f frontend/package.json ]; then
            echo "FRONTEND_SOURCE=frontend" >> "$GITHUB_ENV"
          elif [ -f package.json ]; then
            echo "FRONTEND_SOURCE=." >> "$GITHUB_ENV"
          else
            echo "Could not find frontend/package.json or package.json" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd "${FRONTEND_SOURCE}"
          npm install

      - name: Inject Secrets & Build Vite
        run: |
          cd "${FRONTEND_SOURCE}"
          # Vite requires environment variables at BUILD time to bake them into the static files.
          # This temporary .env is generated by GitHub Actions and destroyed instantly after build.
          echo "${{ secrets.FRONTEND_ENV_FILE }}" > .env
          npm run build
          rm .env # Safely delete the file so it's gone

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Preflight VM Sync Requirements
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /var/www/fresco/frontend/dist
            touch /var/www/fresco/frontend/dist/.write-test && rm -f /var/www/fresco/frontend/dist/.write-test

      - name: Sync ONLY Built Static Files to Server
        run: |
          # The dist folder contains ZERO environment files, just HTML/JS/CSS.
          cd "${FRONTEND_SOURCE}"
          tar -czf - dist \
            | sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "mkdir -p /var/www/fresco/frontend && rm -rf /var/www/fresco/frontend/dist && tar -xzf - -C /var/www/fresco/frontend"
