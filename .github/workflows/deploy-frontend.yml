name: Deploy Frontend

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || { echo "Missing required secret: SSH_HOST" >&2; exit 1; }
          test -n "${{ secrets.SSH_USER }}" || { echo "Missing required secret: SSH_USER" >&2; exit 1; }
          test -n "${{ secrets.SSH_PASSWORD }}" || { echo "Missing required secret: SSH_PASSWORD" >&2; exit 1; }
          test -n "${{ secrets.FRONTEND_ENV_FILE }}" || { echo "Missing required secret: FRONTEND_ENV_FILE" >&2; exit 1; }

      - name: Deploy Frontend On VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi

            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              echo "Node.js/npm missing on VM. Install Node 20 and rerun workflow." >&2
              exit 1
            fi

            mkdir -p /var/www/fresco/frontend/dist

            BUILD_DIR="$(mktemp -d /tmp/fresco-frontend-XXXXXX)"
            cleanup() {
              rm -rf "$BUILD_DIR"
            }
            trap cleanup EXIT

            git clone --depth 1 --branch main https://github.com/veeru2005/fresco-frontend.git "$BUILD_DIR"
            cd "$BUILD_DIR"

            # Vite requires environment variables at build time.
            echo "${{ secrets.FRONTEND_ENV_FILE }}" > .env
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
            rm -f .env

            find /var/www/fresco/frontend/dist -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -R dist/. /var/www/fresco/frontend/dist/

            # Remove legacy source folder from older workflow versions.
            rm -rf /var/www/fresco/frontend-src
